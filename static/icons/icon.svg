<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1a56db"/>
  <g transform="translate(256,256)">
    <!-- Open book -->
    <path d="M-120,-60 C-120,-60 -20,-80 0,-40 C20,-80 120,-60 120,-60 L120,80 C120,80 20,60 0,80 C-20,60 -120,80 -120,80 Z" fill="white" stroke="white" stroke-width="4"/>
    <!-- Center line -->
    <line x1="0" y1="-40" x2="0" y2="80" stroke="#1a56db" stroke-width="3"/>
    <!-- Page lines left -->
    <line x1="-90" y1="-20" x2="-15" y2="-30" stroke="#1a56db" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="-85" y1="5" x2="-15" y2="-5" stroke="#1a56db" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="-80" y1="30" x2="-15" y2="20" stroke="#1a56db" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <!-- Page lines right -->
    <line x1="15" y1="-30" x2="90" y2="-20" stroke="#1a56db" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="15" y1="-5" x2="85" y2="5" stroke="#1a56db" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="15" y1="20" x2="80" y2="30" stroke="#1a56db" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <!-- Magnifying glass -->
    <circle cx="70" cy="-70" r="35" fill="none" stroke="white" stroke-width="8"/>
    <line x1="94" y1="-46" x2="115" y2="-25" stroke="white" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
