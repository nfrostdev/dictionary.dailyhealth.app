<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="A simple, free dictionary for kids. Look up words and learn what they mean."
		/>
		<script>
			(function () {
				var theme = localStorage.getItem('theme');
				if (theme === 'dark' || theme === 'light') {
					document.documentElement.setAttribute('data-theme', theme);
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<noscript>
			<p style="text-align: center; padding: 2rem; font-family: system-ui, sans-serif">
				This dictionary app needs JavaScript to work. Please enable JavaScript in your browser.
			</p>
		</noscript>
	</body>
</html>
